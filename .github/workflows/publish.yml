name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Read package metadata
        id: pkg
        run: |
          echo "name=$(node -p 'require(\"./package.json\").name')" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"

      - name: Check npm for existing version
        id: npm_check
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Version already published. Skipping."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Version not found on npm. Publishing."
          fi

      - name: Verify npm token
        if: steps.npm_check.outputs.publish == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "NPM_TOKEN repository secret is required for automatic publish." >&2
            exit 1
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
